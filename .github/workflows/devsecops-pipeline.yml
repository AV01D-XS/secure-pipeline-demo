name: DevSecOps Enterprise Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sast-and-secrets:
    name: 🔒 Static Analysis & Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Python SAST (Bandit)
        run: |
          pip install bandit
          bandit -r . -f custom

      - name: Dockerfile Security Linter (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  container-security:
    name: 🐳 Build & Image Scanning
    needs: sast-and-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image (Local)
        run: docker build -t armorbyte-api:latest .

      - name: Container Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'armorbyte-api:latest'
          format: 'table'
          exit-code: '1' # Fails the pipeline if Critical/High vulns are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-gate:
    name: 🚀 Production Gate
    needs: container-security
    runs-on: ubuntu-latest
    steps:
      - name: Verification Passed
        run: |
          echo "✅ Secret Scanning Passed"
          echo "✅ Python SAST Passed"
          echo "✅ Dockerfile Linting Passed"
          echo "✅ Container Vulnerability Scan Passed"
          echo "Infrastructure is secure. Ready for ECR/DockerHub deployment."